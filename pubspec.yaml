name: seendchat
description: SeendChat - Mensajería inteligente
publish_to: 'none'
version: 2.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  web_socket_channel: ^2.4.0
  shared_preferences: ^2.2.0
  provider: ^6.0.5
  image_picker: ^1.0.4
  video_player: ^2.8.0
  cached_network_image: ^3.3.1
  flutter_cache_manager: ^3.3.1
  permission_handler: ^11.3.1
  intl: ^0.18.0
  path_provider: ^2.1.0
  sqflite: ^2.3.0
  share_plus: ^7.2.2
  flutter_webrtc: ^0.9.48
  flutter_svg: ^2.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
