name: Build & Release APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'

      - name: Instalar dependencias
        run: flutter pub get

      - name: Compilar APK release
        run: flutter build apk --release

      - name: Crear Release automático
        uses: softprops/action-gh-release@v1
        with:
          name: "SeendChat v2.1 - Build ${{ github.run_number }}"
          tag_name: "v2.1-build-${{ github.run_number }}"
          body: |
            ## 📱 SeendChat APK
            
            **Build:** ${{ github.run_number }}
            **Fecha:** ${{ github.event.head_commit.timestamp }}
            **Commit:** ${{ github.sha }}
            
            ### 📥 Descargar
            Ve a la sección **Assets** para descargar el APK.
            
            ### ✅ Funcionalidades
            - Chats individuales, grupales y canales
            - Mensajes en tiempo real con WebSocket
            - Emojis iOS + Stickers personalizados
            - Bots con API oficial
            - Sin historial (excepto canales)
            - Flat Design con tema oscuro
          files: build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: SeendChat-APK
          path: build/app/outputs/flutter-apk/app-release.apk
